version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dash_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-puser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ppassword}
      POSTGRES_DB: ${DB_NAME:-dash_davi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    command: postgres -c 'max_connections=200'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-puser} -d ${DB_NAME:-dash_davi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dash_backend
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-puser}
      DB_PASSWORD: ${DB_PASSWORD:-ppassword}
      DB_NAME: ${DB_NAME:-dash_davi}
      API_KEY_AGENDOR: ${API_KEY_AGENDOR}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Beautyderm2026}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:3001
        JWT_SECRET: ${JWT_SECRET}
    container_name: dash_frontend
    environment:
      BACKEND_URL: http://backend:3001
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
